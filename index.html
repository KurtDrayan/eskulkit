<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EskulKit</title>
<link rel="stylesheet" href="eskulkit-mvp.css">
</head>
<body>

<div class="device" id="device">
  <div class="sidebar">
    <div class="brand-badge"><img src="eskulkit-logo.png" alt="EskulKit"></div>
    <div class="dots"><i></i><i></i><i></i></div>
    <div class="nav" id="nav">
      <button class="nav-item" data-page="dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-page="module">
        <svg viewBox="0 0 24 24"><path d="M4 5c2-1.3 4-1.3 6 0v13c-2-1.3-4-1.3-6 0z"/><path d="M20 5c-2-1.3-4-1.3-6 0v13c2-1.3 4-1.3 6 0z"/></svg>
        Module
      </button>
      <button class="nav-item" data-page="quiz">
        <svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h3"/></svg>
        Quiz
      </button>
      <button class="nav-item" data-page="videos">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M10 9.5v5l4.5-2.5z" fill="#fff" stroke="none"/></svg>
        Video
      </button>
      <button class="nav-item" data-page="help">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.3a2.5 2.5 0 0 1 4.9.7c0 1.7-2.4 2-2.4 3.5"/><path d="M12 17h.01"/></svg>
        Help
      </button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="titleblock">
        <h1 id="page-title">Student Dashboard</h1>
        <div class="sub" id="page-sub">Choose your grade level, watch lessons, and track progress in one place.</div>
        <button class="backbtn" id="backBtn" style="display:none">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
          Change grade
        </button>
      </div>

      <div class="school-logo">
        <img src="deped-logo.png" alt="DepEd Logo">
      </div>
      
    </div>
    <div class="content" id="content"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBody"></div></div>
</div>

<script src="eskulkit-mvp.js"></script>
</body>
</html>
